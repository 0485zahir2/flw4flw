<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<a href="status.html" class="statusBtn">📊</a>

<a href="form.html" class="backIcon">⬅</a>

<h1>Complete Payment</h1>

<p id="amountText"></p>
<p id="usernameText"></p>

<h3>Pay using UPI</h3>

<p><b>UPI ID: 0485zahir@okcici</b></p>

<img src="qr_code.jpeg" alt="QR CODE NOT AVAILABLE" height="240px">

<p style="color:red;">
⚠ Enter correct payment name or order will be rejected
</p>

<h2>Enter Your Account Holder's Name:</h2>

<form id="paymentForm">
  <input type="text" id="payerName" placeholder="Enter Name used for Payment" required><br><br>

  <button type="submit">Submit</button>
</form>

<script>
let amount = localStorage.getItem("amount");
let points = localStorage.getItem("points");

document.getElementById("amountText").innerText = "Amount: ₹" + points;
document.getElementById("usernameText").innerText =
  "Username: " + localStorage.getItem("username");
</script>

<!-- 🔥 FIREBASE (NO STORAGE, ONLY DATA) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsAbJal0g6VBk6GmIR8K3eJpXvCAfDsiE",
  authDomain: "flw4flw-48621.firebaseapp.com",
  projectId: "flw4flw-48621",
  storageBucket: "flw4flw-48621.firebasestorage.app",
  messagingSenderId: "691545515899",
  appId: "1:691545515899:web:8d3ce98b2d567da15dbfde"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.onload = () => {

  document.getElementById("paymentForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
        await addDoc(collection(db, "orders"), {
            username: localStorage.getItem("username"),
            payerName: document.getElementById("payerName").value,
            amount: localStorage.getItem("amount"),
            status: "pending",
            time: new Date()
        });

    alert("✅ Order submitted!");

        if (confirm("View Order Status?")) {
        window.location.href = "status.html";
    }

    } catch (err) {
        console.error(err);
        alert("❌ Error submitting");
    }

  });

};
</script>

</body>
</html>
